workflow:
  rules:
    # Run on tag pushes (v*)
    - if: $CI_COMMIT_TAG =~ /^v/
    # Run on manual pipeline triggers
    - if: $CI_PIPELINE_SOURCE == "web"

variables:
  NODE_VERSION: "22"

# Cache node_modules across jobs on the same runner
.node_cache: &node_cache
  cache:
    key:
      files:
        - package-lock.json
        - backend/package-lock.json
#        - frontend/package-lock.json
    paths:
      - node_modules/
      - backend/node_modules/
#      - frontend/node_modules/
    policy: pull-push

# ---------------------------------------------------------------------------
# Build jobs — one per platform
# ---------------------------------------------------------------------------

build:macos:
  <<: *node_cache
  stage: build
  tags:
    - saas-macos-medium-m1   # GitLab.com shared macOS runner (ARM64)
  script:
    - node --version
    - npm ci
    - npm --prefix backend ci
    - npm --prefix frontend ci
    - npm run dist -- --publish never
    # --- macOS code signing + notarization (uncomment when ready) ---
    # env vars to add in GitLab CI/CD Settings → Variables:
    #   CSC_LINK, CSC_KEY_PASSWORD, APPLE_ID,
    #   APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
  artifacts:
    name: jobdash-macos
    paths:
      - dist/*.dmg
      - dist/*.blockmap
      - dist/latest-mac.yml
    expire_in: 14 days
    when: always

build:windows:
  <<: *node_cache
  stage: build
  tags:
    - saas-windows-medium-amd64   # GitLab.com shared Windows runner
  script:
    - node --version
    - npm ci
    - npm --prefix backend ci
    - npm --prefix frontend ci
    - npm run dist -- --publish never
    # --- Windows code signing (uncomment when ready) ---
    # env vars: CSC_LINK, CSC_KEY_PASSWORD
  artifacts:
    name: jobdash-windows
    paths:
      - dist/*.exe
      - dist/*.blockmap
      - dist/latest.yml
    expire_in: 14 days
    when: always

build:linux:
  <<: *node_cache
  stage: build
  image: node:22-bookworm
  tags:
    - saas-linux-medium-amd64
  before_script:
    # electron-builder needs these for Linux packaging
    - apt-get update -qq && apt-get install -y --no-install-recommends
        rpm fakeroot libarchive-tools
        libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2
        libdrm2 libxkbcommon0 libxcomposite1 libxdamage1
        libxfixes3 libxrandr2 libgbm1 libasound2
  script:
    - node --version
    - npm ci
    - npm --prefix backend ci
    - npm --prefix frontend ci
    - npm run dist -- --publish never
  artifacts:
    name: jobdash-linux
    paths:
      - dist/*.AppImage
      - dist/*.deb
      - dist/*.blockmap
      - dist/latest-linux.yml
    expire_in: 14 days
    when: always

# ---------------------------------------------------------------------------
# Release job — runs only on tag pushes, after all builds succeed
# ---------------------------------------------------------------------------

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - build:macos
    - build:windows
    - build:linux
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  script:
    - echo "Creating GitLab release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "jobdash $CI_COMMIT_TAG"
    description: |
      ## jobdash $CI_COMMIT_TAG

      ### Downloads
      - **macOS** (Apple Silicon): `jobdash-*-arm64.dmg`
      - **Windows**: `jobdash-*-Setup.exe`
      - **Linux**: `jobdash-*.AppImage`

      See [README](https://gitlab.com/anton.kronaj/jobdash/-/blob/main/README.md) for setup instructions.
    assets:
      links:
        - name: "macOS (Apple Silicon) .dmg"
          url: "https://gitlab.com/anton.kronaj/jobdash/-/jobs/artifacts/$CI_COMMIT_TAG/raw/dist/jobdash-$CI_COMMIT_TAG-arm64.dmg?job=build:macos"
          link_type: package
        - name: "Windows .exe"
          url: "https://gitlab.com/anton.kronaj/jobdash/-/jobs/artifacts/$CI_COMMIT_TAG/raw/dist/jobdash-$CI_COMMIT_TAG-Setup.exe?job=build:windows"
          link_type: package
        - name: "Linux .AppImage"
          url: "https://gitlab.com/anton.kronaj/jobdash/-/jobs/artifacts/$CI_COMMIT_TAG/raw/dist/jobdash-$CI_COMMIT_TAG.AppImage?job=build:linux"
          link_type: package
