<div class="shell">

  <!-- ── Toolbar ───────────────────────────────────────────────────────── -->
  <header class="toolbar">
    <span class="app-name">jobdash</span>
    <div class="flex-1"></div>
    <button class="tb-btn accent" (click)="refresh()" [disabled]="refreshing()"
            title="Fetch jobs from external sources (Adzuna, The Muse, RemoteOK, Workable, Findwork). This can take a moment.">
      ↻ {{ refreshing() ? 'Refreshing…' : 'Refresh' }}
    </button>
    <button class="tb-btn" (click)="openAddModal()">+ Add job</button>
    <button class="tb-btn" (click)="settingsOpen.set(!settingsOpen())">⚙ Settings</button>
  </header>

  <!-- ── Body ─────────────────────────────────────────────────────────── -->
  <div class="body">

    <!-- Sidebar -->
    <app-sidebar
      [searchText]="searchText"
      [savedOnly]="savedOnly"
      [appliedOnly]="appliedOnly"
      [showHidden]="showHidden"
      [usOnly]="usOnly"
      [postedWithin]="postedWithin"
      [minScore]="minScore"
      [selectedSource]="selectedSource"
      [stats]="stats"
      [sources]="sources"
      [refreshing]="refreshing"
      (filterChanged)="loadJobs()">
    </app-sidebar>

    <!-- Main content -->
    <main class="content">
      <div class="msg-bar" *ngIf="message()">{{ message() }}</div>
      <div class="list-hint" *ngIf="loading()">Loading…</div>
      <div class="list-hint" *ngIf="!loading() && visibleJobs().length === 0">
        No jobs yet — click Refresh to fetch.
      </div>

      <div class="job-list">
        <app-job-card
          *ngFor="let job of visibleJobs()"
          [job]="job"
          [expanded]="expandedId() === job.id"
          [applying]="applyingId() === job.id"
          [applyDraft]="applyDraft()"
          (toggleExpand)="toggleExpand($event)"
          (toggleSave)="toggleSave($event)"
          (openApply)="openApply($event)"
          (unapply)="unapply($event)"
          (hide)="hide($event)"
          (unhide)="unhide($event)"
          (saveApply)="saveApply($event)"
          (cancelApply)="applyingId.set(null)"
          (setApplyDate)="setApplyDate($event)"
          (setApplyNotes)="setApplyNotes($event)"
          (edit)="openEditModal($event)">
        </app-job-card>
      </div>
    </main>
  </div>

  <app-settings-drawer
    [isOpen]="settingsOpen()"
    [settings]="settings()"
    [resume]="resume()"
    [keys]="keys()"
    [uploading]="uploading()"
    (close)="settingsOpen.set(false)"
    (saveSettings)="onSaveSettings($event)"
    (uploadResume)="onFileSelected($event)"
    (saveKeys)="onSaveKeys($event)">
  </app-settings-drawer>

  <app-add-job-modal
    [isOpen]="addOpen()"
    [jobToEdit]="jobToEdit()"
    (close)="addOpen.set(false)"
    (save)="onSaveManualJob($event)">
  </app-add-job-modal>

  <app-status-bar [stats]="stats()"></app-status-bar>

</div>
